name: Sync PL results to Google Sheet
 
on:
  schedule:
    # Every 20 minutes during the result window: Fri-Mon, 15:00-23:40 Prague.
    # (GitHub cron is UTC; Prague is UTC+2 until 25 Oct 2026.)
    # Kickoffs are 13:30-21:00 Prague, matches end ~2h later, so every
    # possible final whistle falls inside this window.
    - cron: "*/20 13-21 * * 5,6,0,1"
    # Weekly safety sweep (Tuesday 11:00 Prague) — catches skipped runs
    # or matches rescheduled outside Fri-Mon.
    - cron: "0 9 * * 2"
  workflow_dispatch: {}   # manual "Run workflow" button as a fallback
 
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: pip install requests gspread google-auth
 
      - name: Sync results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          FD_SEASON: "2026"
        run: python sync_results.py
