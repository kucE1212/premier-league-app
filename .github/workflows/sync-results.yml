name: Sync PL results to Google Sheet
 
on:
  schedule:
    # Backstop only — cron-job.org drives the real cadence.
    - cron: "0 9 * * 2"          # Tue 11:00 Prague weekly sweep
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log changes without writing to the sheet"
        type: boolean
        default: false
 
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: pip install requests gspread google-auth
 
      - name: Sync results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          FD_SEASON: "2026"
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python sync_results.py
